# Fly.io configuration for backend deployment
app = "alan-refiner-backend"
primary_region = "iad"

[build]

[env]
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory_mb = 512
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "python -m pip install --upgrade pip && pip install -r requirements.txt"


