services:
  - type: web
    name: alan-refiner-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: REFINER_OUTPUT_DIR
        value: data/output
      - key: DEBUG
        value: false


